<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — PipeDesk</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f5ff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.logo { font-size: 28px; font-weight: 800; color: #1a56db; margin-bottom: 8px; }
.logo span { color: #1a1a1a; }
.tagline { font-size: 14px; color: #64748b; margin-bottom: 32px; }
.card { background: #fff; border-radius: 16px; padding: 36px 28px; width: 100%; max-width: 440px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.card h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
.card p { font-size: 14px; color: #64748b; margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
input { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 15px; color: #1a1a1a; outline: none; transition: border-color 0.2s; }
input:focus { border-color: #1a56db; }
.coupon-row { display: flex; gap: 8px; }
.coupon-row input { flex: 1; }
.apply-btn { background: #f1f5f9; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 12px 16px; font-size: 14px; font-weight: 600; color: #374151; cursor: pointer; white-space: nowrap; }
.apply-btn:hover { background: #e2e8f0; }
.coupon-msg { font-size: 13px; margin-top: 6px; }
.coupon-msg.success { color: #16a34a; }
.coupon-msg.error { color: #dc2626; }
.submit-btn { width: 100%; background: #1a56db; color: #fff; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
.submit-btn:hover { background: #1648c0; }
.submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }
.error-msg { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px; font-size: 14px; color: #dc2626; margin-bottom: 16px; display: none; }
.divider { text-align: center; font-size: 14px; color: #94a3b8; margin: 16px 0; }
.login-link { text-align: center; font-size: 14px; color: #64748b; }
.login-link a { color: #1a56db; font-weight: 600; }
.trial-badge { background: #dcfce7; color: #166534; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-bottom: 20px; text-align: center; }
</style>
</head>
<body>

<div class="logo">Pipe<span>Desk</span></div>
<div class="tagline">The CRM built for solo plumbers</div>

<div class="card">
  <h1>Start Your Free Trial</h1>
  <p>14 days free — no credit card required</p>

  <div class="trial-badge">🔧 14-day free trial · Cancel anytime</div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label>Your Name</label>
    <input type="text" id="owner_name" placeholder="John Smith" required>
  </div>

  <div class="form-group">
    <label>Business Name</label>
    <input type="text" id="business_name" placeholder="Smith Plumbing" required>
  </div>

  <div class="form-group">
    <label>Phone Number</label>
    <input type="tel" id="phone" placeholder="(555) 123-4567" required>
  </div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="john@smithplumbing.com" required>
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="At least 8 characters" required>
  </div>

  <div class="form-group">
    <label>Coupon Code <span style="font-weight:400;color:#94a3b8;">(optional)</span></label>
    <div class="coupon-row">
      <input type="text" id="coupon_code" placeholder="Enter code" style="text-transform:uppercase;">
      <button class="apply-btn" onclick="validateCoupon()">Apply</button>
    </div>
    <div class="coupon-msg" id="couponMsg"></div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="handleSignup()">
    Start Free Trial
  </button>

  <div class="divider">or</div>
  <div class="login-link">Already have an account? <a href="/login.html">Log in</a></div>
</div>

<script>
let couponValid = false;

async function validateCoupon() {
  const code = document.getElementById('coupon_code').value.trim();
  const msg = document.getElementById('couponMsg');
  if (!code) return;

  try {
    const res = await fetch('/api/auth/validate-coupon', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await res.json();
    msg.textContent = data.message;
    msg.className = 'coupon-msg ' + (data.valid ? 'success' : 'error');
    couponValid = data.valid;
  } catch (err) {
    msg.textContent = 'Could not validate code. Try again.';
    msg.className = 'coupon-msg error';
  }
}

async function handleSignup() {
  const btn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.style.display = 'none';

  const owner_name = document.getElementById('owner_name').value.trim();
  const business_name = document.getElementById('business_name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const coupon_code = document.getElementById('coupon_code').value.trim();

  if (!owner_name || !business_name || !phone || !email || !password) {
    errorMsg.textContent = 'Please fill in all required fields.';
    errorMsg.style.display = 'block';
    return;
  }

  if (password.length < 8) {
    errorMsg.textContent = 'Password must be at least 8 characters.';
    errorMsg.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating your account...';

  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ owner_name, business_name, phone, email, password, coupon_code })
    });
    const data = await res.json();

    if (data.error) {
      errorMsg.textContent = data.error;
      errorMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Start Free Trial';
      return;
    }

    localStorage.setItem('pipedesk_token', data.token);
    localStorage.setItem('pipedesk_user', JSON.stringify(data.user));
    window.location.href = '/dashboard.html';
  } catch (err) {
    errorMsg.textContent = 'Something went wrong. Please try again.';
    errorMsg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Start Free Trial';
  }
}
</script>
</body>
</html>
